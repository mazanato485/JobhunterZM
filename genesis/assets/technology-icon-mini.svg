<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="50" height="50">
  <defs>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#techGrad)"/>
  <!-- Laptop frame -->
  <rect x="90" y="100" width="330" height="220" rx="8" fill="none" stroke="white" stroke-width="14"/>
  <!-- Screen -->
  <rect x="110" y="120" width="290" height="180" fill="none" stroke="white" stroke-width="12"/>
  <!-- Gear/Processor -->
  <circle cx="200" cy="170" r="35" fill="none" stroke="white" stroke-width="10"/>
  <g transform="translate(200, 170)">
    <rect x="-8" y="-45" width="16" height="20" rx="4" fill="white"/>
    <rect x="-8" y="25" width="16" height="20" rx="4" fill="white"/>
    <rect x="-45" y="-8" width="20" height="16" rx="4" fill="white"/>
    <rect x="25" y="-8" width="20" height="16" rx="4" fill="white"/>
    <circle cx="0" cy="0" r="10" fill="white"/>
  </g>
  <!-- Circuit lines -->
  <line x1="240" y1="155" x2="310" y2="155" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="240" y1="185" x2="310" y2="185" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <circle cx="320" cy="155" r="6" fill="white"/>
  <circle cx="320" cy="185" r="6" fill="white"/>
  <!-- Laptop base -->
  <rect x="130" y="300" width="250" height="18" rx="4" fill="none" stroke="white" stroke-width="11"/>
  <circle cx="160" cy="318" r="5" fill="white"/>
  <circle cx="190" cy="318" r="5" fill="white"/>
  <circle cx="320" cy="318" r="5" fill="white"/>
  <circle cx="350" cy="318" r="5" fill="white"/>
</svg>